name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build client bundle (no nitro)
        env:
          STATIC_BUILD: "1"
          GH_PAGES_BASE: ${{ steps.pages.outputs.base_path }}
        run: bun run vite build

      - name: Snapshot SSR HTML into dist/client/index.html
        env:
          STATIC_BUILD: "1"
          GH_PAGES_BASE: ${{ steps.pages.outputs.base_path }}
        run: node scripts/make-static-spa.mjs

      - name: List build output (debug)
        run: ls -la dist/client && head -c 600 dist/client/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
